# =============================================================================
# docker-compose.yml
# Corporate Credit Rating Data Pipeline
# =============================================================================
# Services:
#   postgres          – PostgreSQL 15 (Airflow metadata + corporate ratings DB)
#   airflow-init      – One-off: initialise Airflow DB and create admin user
#   airflow-webserver – Airflow UI  (http://localhost:8090, admin / admin)
#   airflow-scheduler – Airflow scheduler
#   api               – FastAPI service (http://localhost:8000)
#   all-tests         – All tests (unit + integration) runner (profile: all-tests)
#   tests             – Unit-test runner (profile: test)
#   integration-tests – Integration-test runner (profile: integration-test)
#
# Quick start (production / first time):
#   docker compose up -d
#   Open http://localhost:8091 and trigger the `corporate_ratings_pipeline` DAG
#
# Development (clean restart — wipes data and rebuilds):
#   make up
#
# Run all tests (no prior up needed — starts all deps automatically):
#   make test          (unit + integration)
#   make test-unit
#   make test-integration
#
# Tear down (wipes all data and volumes):
#   make down
# =============================================================================

# ---------------------------------------------------------------------------
# Shared Airflow configuration
# ---------------------------------------------------------------------------
x-airflow-common:
  &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  pull_policy: build
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

    # Airflow connections — production (public schema) and integration-test (corporate_test schema)
    AIRFLOW_CONN_POSTGRES_CORPORATE: '{"conn_type": "postgres", "host": "postgres", "port": 5432, "schema": "corporate", "login": "corporate", "password": "corporate"}'
    AIRFLOW_CONN_POSTGRES_CORPORATE_TEST: '{"conn_type": "postgres", "host": "postgres", "port": 5432, "schema": "corporate", "login": "corporate", "password": "corporate", "extra": "{\"options\": \"-csearch_path=corporate_test,public\"}"}'

    # Pipeline runtime config
    INPUT_FILES_DIR: /opt/airflow/data/input_files
    EXTRACTED_SHEETS_DIR: /opt/airflow/data/extracted_sheets
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: corporate
    POSTGRES_USER: corporate
    POSTGRES_PASSWORD: corporate

    # Email notifications (optional — set ALERT_EMAIL to enable)
    AIRFLOW__SMTP__SMTP_HOST: "smtp.example.com"
    AIRFLOW__SMTP__SMTP_PORT: "587"
    AIRFLOW__SMTP__SMTP_STARTTLS: "true"
    AIRFLOW__SMTP__SMTP_SSL: "false"
    AIRFLOW__SMTP__SMTP_USER: "sender@example.com"
    AIRFLOW__SMTP__SMTP_PASSWORD: ""
    AIRFLOW__SMTP__SMTP_MAIL_FROM: "sender@example.com"
    ALERT_EMAIL: ""

  volumes:
    - ./dags:/opt/airflow/dags
    - ./corporate_pipeline:/opt/airflow/corporate_pipeline
    - ./data:/opt/airflow/data
    - ./sql:/opt/airflow/sql:ro
    - airflow_logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # PostgreSQL
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_db.sh:/docker-entrypoint-initdb.d/init_db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --------------------------------------------------------------------------
  # Airflow – one-off initialisation
  # --------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
        echo "[airflow-init] Initialisation complete."
    restart: "no"

  # --------------------------------------------------------------------------
  # Airflow – web server (UI at http://localhost:8091)
  # --------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8091:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Airflow – scheduler
  # --------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    hostname: airflow-scheduler
    command: scheduler
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # FastAPI – corporate ratings REST API (http://localhost:8000)
  # --------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    pull_policy: build
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: corporate
      POSTGRES_USER: corporate
      POSTGRES_PASSWORD: corporate
      INPUT_FILES_DIR: /app/data/input_files
    volumes:
      - ./api:/app/api
      - ./data/input_files:/app/data/input_files:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # FastAPI – test instance pointing at the corporate_test schema
  # Started automatically when running integration-test or all-tests profiles.
  # The production `api` service (public schema) is unaffected.
  # --------------------------------------------------------------------------
  api-test:
    build:
      context: ./api
      dockerfile: Dockerfile
    pull_policy: build
    ports:
      - "8001:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: corporate
      POSTGRES_USER: corporate
      POSTGRES_PASSWORD: corporate
      POSTGRES_SCHEMA: corporate_test
      INPUT_FILES_DIR: /app/data/input_files
    volumes:
      - ./api:/app/api
      - ./data/input_files:/app/data/input_files:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    profiles:
      - integration-test
      - all-tests

  # --------------------------------------------------------------------------
  # All tests — unit + integration (profile: all-tests)
  # Run with: docker compose --profile all-tests run --rm all-tests
  # Requires the full stack to be up and healthy first.
  # --------------------------------------------------------------------------
  all-tests:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    working_dir: /app
    user: "0:0"
    volumes:
      - .:/app
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      AIRFLOW_BASE_URL: "http://airflow-webserver:8080"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: corporate
      POSTGRES_USER: corporate
      POSTGRES_PASSWORD: corporate
      POSTGRES_SCHEMA: corporate_test
      AIRFLOW_TEST_CONN_ID: postgres_corporate_test
      API_BASE_URL: "http://api-test:8000"
      AIRFLOW__SMTP__SMTP_HOST: "smtp.example.com"
      AIRFLOW__SMTP__SMTP_PORT: "587"
      AIRFLOW__SMTP__SMTP_STARTTLS: "true"
      AIRFLOW__SMTP__SMTP_USER: "sender@example.com"
      AIRFLOW__SMTP__SMTP_PASSWORD: ""
      AIRFLOW__SMTP__SMTP_MAIL_FROM: "sender@example.com"
      ALERT_EMAIL: ""
    depends_on:
      postgres:
        condition: service_healthy
      airflow-webserver:
        condition: service_healthy
      airflow-scheduler:
        condition: service_healthy
      api-test:
        condition: service_healthy
    command: ["python", "-m", "pytest", "tests/unit", "tests/integration", "-v", "--tb=short", "-s"]
    profiles:
      - all-tests

  # --------------------------------------------------------------------------
  # Unit tests (profile: test)
  # Run with: docker compose --profile test run --rm tests
  # --------------------------------------------------------------------------
  tests:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    working_dir: /app
    user: "0:0"
    volumes:
      - .:/app
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      AIRFLOW__SMTP__SMTP_HOST: "smtp.example.com"
      AIRFLOW__SMTP__SMTP_PORT: "587"
      AIRFLOW__SMTP__SMTP_STARTTLS: "true"
      AIRFLOW__SMTP__SMTP_USER: "sender@example.com"
      AIRFLOW__SMTP__SMTP_PASSWORD: ""
      AIRFLOW__SMTP__SMTP_MAIL_FROM: "sender@example.com"
      ALERT_EMAIL: ""
    command: ["python", "-m", "pytest", "tests/unit", "-v", "--tb=short"]
    profiles:
      - test

  # --------------------------------------------------------------------------
  # Integration tests (profile: integration-test)
  # Run with: docker compose --profile integration-test run --rm integration-tests
  # Requires the full stack to be up and healthy first.
  # --------------------------------------------------------------------------
  integration-tests:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    working_dir: /app
    user: "0:0"
    volumes:
      - .:/app
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      AIRFLOW_BASE_URL: "http://airflow-webserver:8080"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: corporate
      POSTGRES_USER: corporate
      POSTGRES_PASSWORD: corporate
      POSTGRES_SCHEMA: corporate_test
      AIRFLOW_TEST_CONN_ID: postgres_corporate_test
      API_BASE_URL: "http://api-test:8000"
      AIRFLOW__SMTP__SMTP_HOST: "smtp.example.com"
      AIRFLOW__SMTP__SMTP_PORT: "587"
      AIRFLOW__SMTP__SMTP_STARTTLS: "true"
      AIRFLOW__SMTP__SMTP_USER: "sender@example.com"
      AIRFLOW__SMTP__SMTP_PASSWORD: ""
      AIRFLOW__SMTP__SMTP_MAIL_FROM: "sender@example.com"
      ALERT_EMAIL: ""
    depends_on:
      postgres:
        condition: service_healthy
      airflow-webserver:
        condition: service_healthy
      airflow-scheduler:
        condition: service_healthy
      api-test:
        condition: service_healthy
    command: ["python", "-m", "pytest", "tests/integration", "-v", "--tb=short", "-s"]
    profiles:
      - integration-test

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  airflow_logs:
